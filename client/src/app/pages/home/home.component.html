<section class="home-page">
  @if (user(); as currentUser) {
    <h1>Welcome, {{ currentUser.fullName }}</h1>
    <p>Signed in as <strong>{{ activeRole() }}</strong></p>
  }

  <div class="home-actions">
    <a mat-flat-button color="primary" routerLink="/profile">My Profile</a>
    @if (isAdmin()) {
      <a mat-stroked-button routerLink="/admin/employees">Manage Employees</a>
    }
    <button mat-stroked-button type="button" (click)="logout()">Sign out</button>
  </div>
</section>
