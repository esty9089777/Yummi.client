<section class="home-page">
  @if (!isOpen()) {
    <div class="closed-banner" role="alert">
      <mat-icon>schedule</mat-icon>
      <div>
        <strong>The restaurant is currently closed.</strong>
        @if (closedReason(); as reason) {
          <span>{{ reason }}</span>
        }
      </div>
    </div>
  }

  @if (user(); as currentUser) {
    <h1>Welcome, {{ currentUser.fullName }}</h1>
    <p>Signed in as <strong>{{ activeRole() }}</strong></p>
  }

  <button mat-stroked-button type="button" (click)="logout()">
    Sign out
  </button>
</section>
