<div
  class="star-rating"
  [class.compact]="compact()"
  [class.readonly]="readonly()"
  role="radiogroup"
  aria-label="Rating"
  (mouseleave)="onStarsLeave()"
>
  @for (star of stars; track star) {
    <button
      type="button"
      class="star-btn"
      role="radio"
      [class.filled]="isFilled(star)"
      [attr.aria-checked]="selectedRating() === star"
      [attr.aria-label]="star + ' star' + (star === 1 ? '' : 's')"
      [disabled]="isDisabled() || readonly()"
      (click)="setRating(star)"
      (mouseenter)="onStarEnter(star)"
    >
      <mat-icon>{{ isFilled(star) ? 'star' : 'star_border' }}</mat-icon>
    </button>
  }
</div>
