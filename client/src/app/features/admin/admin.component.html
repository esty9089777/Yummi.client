<section class="admin-page">
  <header class="admin-header">
    <div>
      <h1>Administration</h1>
      <p>Manage catalog, staff, configuration, and restaurant performance.</p>
    </div>
    <a mat-button routerLink="/">Back to Home</a>
  </header>

  <div class="admin-sections">
    @for (section of sections; track section.title) {
      <mat-card class="admin-section">
        <mat-card-header>
          <mat-card-title>{{ section.title }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <div class="admin-links">
            @for (link of section.links; track link.route) {
              <a [routerLink]="link.route" class="admin-link">
                <mat-icon>{{ link.icon }}</mat-icon>
                <span class="admin-link-text">
                  <strong>{{ link.label }}</strong>
                  <small>{{ link.description }}</small>
                </span>
              </a>
            }
          </div>
        </mat-card-content>
      </mat-card>
    }
  </div>
</section>
