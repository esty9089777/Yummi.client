<section class="admin-feature">
  <header class="admin-header">
    <h1>Admin</h1>
    <a mat-button routerLink="/">Back to Home</a>
  </header>

  @if (isAdmin()) {
    <div class="admin-links">
      <a mat-flat-button color="primary" routerLink="/admin/dashboard">
        Statistics dashboard
      </a>
      <a mat-flat-button color="primary" routerLink="/admin/employees">
        Manage employees
      </a>
      <a mat-flat-button color="primary" routerLink="/admin/categories">
        Manage categories
      </a>
      <a mat-flat-button color="primary" routerLink="/admin/ingredients">
        Manage ingredients
      </a>
      <a mat-stroked-button routerLink="/profile">My profile</a>
    </div>
  }
</section>
